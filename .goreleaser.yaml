version: 2
project_name: seranking-pp-cli
changelog:
  disable: true
builds:
  - id: seranking-pp-cli
    main: ./cmd/seranking-pp-cli
    binary: seranking-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X seranking-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: seranking-pp-mcp
    main: ./cmd/seranking-pp-mcp
    binary: seranking-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: seranking-pp-cli
    repository:
      owner: pimmetjeoss
      name: homebrew-tap
    homepage: "https://github.com/pimmetjeoss/seranking-pp-cli"
    description: "Agent-native OpenAPI subset for SE Ranking Data API and Project API based on official docs at..."
    install: |
      bin.install "seranking-pp-cli"
      bin.install "seranking-pp-mcp"
